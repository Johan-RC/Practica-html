<!DOCTYPE html><!-- declara que el documento es HTML5 -->
<html lang="es"> <!--elemento raiz con atributo de idioma español-->
<head> <!-- contenedor de metadatos y enlaces a recursos información sobre la página.
Aquí NO va contenido visible. -->
    <meta charset="UTF-8"><!-- codificación de caracteres UTF-8 Permite mostrar correctamente:

tildes, y simbolos especiales -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- responsive: escala según ancho de dispositivo  -->
    <link rel="stylesheet" href="/estilos.css"> <!-- enlace al archivo CSS local -->
   <link rel="stylesheet" href=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"> <!-- CDN de Bootstrap (opcional)  Bootstrap, que es un framework de estilos.
Sirve para: Diseños modernos,Botones, tarjetas, grids ya hechos
CDN significa que lo cargas desde internet, no desde tu computadora.-->
    <title>Practicas-HTML</title> <!-- título que aparece en la pestaña del navegador -->
    </head>
    <body> <!--Aquí va todo lo que el usuario ve en la página. -->
    <header class="site-header"> <!-- encabezado semántico de la página Generalmente contiene: logo, Menu, Navegacion-->
    <div class="header-top"> <!-- contenedor que agrupa logo y navegación -->
    <div class="logo"> <!-- bloque del logo/identidad -->
    <span class="tag">&lt;html&gt;</span> <!-- etiqueta estilo código (ej: <html>) -->
    <span class="brand">blog</span> <!-- nombre de la marca/ sitio -->
    </div>
    <nav class="nav"> <!-- elemento nav que contiene la navegación del menú principal -->
    <ul class="nav-list"> <!-- lista sin estilo que contiene los enlaces -->
    <li><a href="#">Estructurales</a></li> <!-- enlace a sección Estructurales -->
    <li><a href="#">Texto</a></li> <!-- enlace a sección Texto -->
    <li><a href="#">Listas</a></li> <!-- enlace a sección Listas -->
    <li><a href="#">Formularios</a></li> <!-- enlace a sección Formularios -->
    <li><a href="#">Tablas</a></li> <!-- enlace a sección Tablas -->
    <li><a href="#">Multimedia</a></li> <!-- enlace a sección Multimedia -->
    </ul> 
    </nav> <!-- Cierra la sección de navegación --> 
    </div>  <!--Cierra un contenedor--> 
    </header> <!-- Cierra el encabezado de la página.-->
    </body>   <!-- Cierra el cuerpo del documento, Todo lo visible debe estar dentro del <body>. -->
    <script src="/function.js"></script> <!-- enlace a script JS local (asegúrate que la ruta sea correcta) -->
    </html> <!-- cierra el documento HTML -->
